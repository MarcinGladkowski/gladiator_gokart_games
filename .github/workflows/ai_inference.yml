name: 'AI inference'

on: workflow_dispatch

jobs:
  inference:
    permissions:
      models: read
    runs-on: ubuntu-latest
    steps:
      - name: Test Local Action
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: 'Hello!'
          system-prompt-file: './.claude/skills/extract-races-results-remote/results.prompt.md'

      - name: Print Output
        id: output
        run: echo "${{ steps.inference.outputs.response }}"